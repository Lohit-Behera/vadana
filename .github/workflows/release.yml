name: Release Vadana

on:
  workflow_dispatch:
    inputs:
      version:
        description: "App version (example: 0.2.0-beta.1)"
        required: true
        type: string
      release_notes:
        description: "Release notes shown in updater + GitHub release"
        required: false
        default: "Bug fixes and improvements."
        type: string

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: windows-latest
    env:
      VERSION: ${{ inputs.version }}
      RELEASE_NOTES: ${{ inputs.release_notes }}
      # Required repo secret: TAURI_SIGNING_PRIVATE_KEY
      # Optional repo secret: TAURI_SIGNING_PRIVATE_KEY_PASSWORD
      TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
      TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Validate signing key secret exists
        shell: pwsh
        run: |
          if ([string]::IsNullOrWhiteSpace($env:TAURI_SIGNING_PRIVATE_KEY)) {
            throw "Missing TAURI_SIGNING_PRIVATE_KEY repository secret."
          }

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Verify version matches source files
        shell: pwsh
        run: |
          $version = "${{ env.VERSION }}"
          $pkg = (Get-Content package.json | ConvertFrom-Json).version
          $tauri = (Get-Content src-tauri/tauri.conf.json | ConvertFrom-Json).version
          $cargo = (Select-String -Path src-tauri/Cargo.toml -Pattern '^version = "(.+)"$').Matches[0].Groups[1].Value

          if ($pkg -ne $version) { throw "package.json version '$pkg' != input '$version'" }
          if ($tauri -ne $version) { throw "src-tauri/tauri.conf.json version '$tauri' != input '$version'" }
          if ($cargo -ne $version) { throw "src-tauri/Cargo.toml version '$cargo' != input '$version'" }

      - name: Sync backend resources
        run: pnpm run sync-backend

      - name: Build signed installers
        run: pnpm tauri build -- --bundles nsis,msi

      - name: Resolve release artifact paths
        id: artifacts
        shell: pwsh
        run: |
          $v = "${{ env.VERSION }}"
          $nsisExe = "src-tauri/target/release/bundle/nsis/Vadana_${v}_x64-setup.exe"
          $msi = "src-tauri/target/release/bundle/msi/Vadana_${v}_x64_en-US.msi"
          $nsisSig = "${nsisExe}.sig"
          $msiSig = "${msi}.sig"

          foreach ($p in @($nsisExe, $msi, $nsisSig, $msiSig)) {
            if (!(Test-Path $p)) { throw "Missing expected build output: $p" }
          }

          $nsisSigValue = (Get-Content $nsisSig -Raw).Trim()

          "nsis_exe=$nsisExe" >> $env:GITHUB_OUTPUT
          "msi_file=$msi" >> $env:GITHUB_OUTPUT
          "nsis_sig_file=$nsisSig" >> $env:GITHUB_OUTPUT
          "msi_sig_file=$msiSig" >> $env:GITHUB_OUTPUT
          "nsis_sig_value=$nsisSigValue" >> $env:GITHUB_OUTPUT

      - name: Create or update updater feed JSON
        shell: pwsh
        run: |
          $version = "${{ env.VERSION }}"
          $notes = "${{ env.RELEASE_NOTES }}"
          $sig = "${{ steps.artifacts.outputs.nsis_sig_value }}"
          $url = "https://github.com/${{ github.repository }}/releases/download/v${version}/Vadana_${version}_x64-setup.exe"
          $pubDate = (Get-Date).ToUniversalTime().ToString("yyyy-MM-ddTHH:mm:ssZ")

          $json = @{
            version = $version
            notes = $notes
            pub_date = $pubDate
            platforms = @{
              "windows-x86_64" = @{
                signature = $sig
                url = $url
              }
            }
          } | ConvertTo-Json -Depth 10

          Set-Content -Path "app-showcase/public/latest.json" -Value $json

      - name: Commit updater feed
        shell: pwsh
        run: |
          git add app-showcase/public/latest.json
          if (git diff --cached --quiet) {
            echo "No updater feed changes to commit."
            exit 0
          }
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -m "chore(release): update updater feed for v${{ env.VERSION }}"
          git push

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ env.VERSION }}
          name: Vadana v${{ env.VERSION }}
          body: ${{ env.RELEASE_NOTES }}
          prerelease: ${{ contains(inputs.version, 'beta') || contains(inputs.version, 'alpha') || contains(inputs.version, 'rc') }}
          generate_release_notes: true
          files: |
            ${{ steps.artifacts.outputs.nsis_exe }}
            ${{ steps.artifacts.outputs.msi_file }}
            ${{ steps.artifacts.outputs.nsis_sig_file }}
            ${{ steps.artifacts.outputs.msi_sig_file }}
